<svg width="1100" height="260" viewBox="0 0 1100 260" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">GitHub stats cards in purple dark style</title>
  <desc id="desc">Two dark purple GitHub statistic cards showing profile highlights and main languages.</desc>

  <defs>
    <linearGradient id="purpleStroke" x1="0" y1="0" x2="1100" y2="260" gradientUnits="userSpaceOnUse">
      <stop stop-color="#3b0764" />
      <stop offset="0.48" stop-color="#a21caf" />
      <stop offset="1" stop-color="#581c87" />
    </linearGradient>

    <linearGradient id="purpleRing" x1="520" y1="40" x2="690" y2="210" gradientUnits="userSpaceOnUse">
      <stop stop-color="#f000ff" />
      <stop offset="0.52" stop-color="#a21caf" />
      <stop offset="1" stop-color="#3b0764" />
    </linearGradient>

    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <filter id="textGlow" x="-20%" y="-60%" width="140%" height="220%">
      <feGaussianBlur stdDeviation="1.6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <style>
      .card {
        fill: #030006;
        stroke: url(#purpleStroke);
        stroke-width: 2;
      }

      .label {
        fill: #f5f3ff;
        font: 700 22px Consolas, "Fira Code", monospace;
      }

      .value {
        fill: #f5f3ff;
        font: 700 23px Consolas, "Fira Code", monospace;
      }

      .muted {
        fill: #d8b4fe;
        font: 600 18px Consolas, "Fira Code", monospace;
      }

      .title {
        fill: #e879f9;
        font: 800 30px Consolas, "Fira Code", monospace;
        filter: url(#textGlow);
      }

      .fade {
        opacity: 0;
        animation: fadeIn 900ms ease-out forwards;
      }

      .delay-1 { animation-delay: 120ms; }
      .delay-2 { animation-delay: 240ms; }
      .delay-3 { animation-delay: 360ms; }
      .delay-4 { animation-delay: 480ms; }
      .pulse { animation: pulse 2.8s ease-in-out infinite; }
      .scan { animation: scan 5s linear infinite; }

      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(8px); }
        to { opacity: 1; transform: translateY(0); }
      }

      @keyframes pulse {
        0%, 100% { opacity: 0.78; }
        50% { opacity: 1; }
      }

      @keyframes scan {
        0% { transform: translateX(-380px); opacity: 0; }
        18% { opacity: 0.18; }
        50% { opacity: 0.08; }
        100% { transform: translateX(1120px); opacity: 0; }
      }
    </style>
  </defs>

  <rect width="1100" height="260" rx="10" fill="#08070d" />
  <rect class="card fade" x="8" y="8" width="662" height="244" rx="7" />
  <rect class="card fade delay-1" x="682" y="8" width="410" height="244" rx="7" />
  <rect class="scan" x="0" y="0" width="180" height="260" fill="#ffffff" opacity="0.05" />

  <g class="fade delay-1" transform="translate(48 52)">
    <path d="M12 0 L15.7 7.8 L24 9.1 L18 15 L19.4 23.5 L12 19.4 L4.6 23.5 L6 15 L0 9.1 L8.3 7.8 Z" fill="#d946ef" filter="url(#glow)" />
    <text class="label" x="36" y="20">Total Stars Earned:</text>
    <text class="value" x="430" y="20">0</text>
  </g>

  <g class="fade delay-2" transform="translate(48 90)">
    <circle cx="12" cy="12" r="10" stroke="#d946ef" stroke-width="4" filter="url(#glow)" />
    <path d="M12 5 V12 L17 16" stroke="#f5d0fe" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
    <text class="label" x="36" y="20">Total Commits (2026):</text>
    <text class="value" x="430" y="20">37</text>
  </g>

  <g class="fade delay-3" transform="translate(48 128)">
    <circle cx="8" cy="5" r="4" fill="#d946ef" filter="url(#glow)" />
    <circle cx="8" cy="20" r="4" fill="#d946ef" filter="url(#glow)" />
    <circle cx="22" cy="20" r="4" fill="#d946ef" filter="url(#glow)" />
    <path d="M8 9 V16 M12 20 H18" stroke="#d946ef" stroke-width="3" stroke-linecap="round" />
    <text class="label" x="36" y="20">Total PRs:</text>
    <text class="value" x="430" y="20">0</text>
  </g>

  <g class="fade delay-4" transform="translate(48 166)">
    <rect x="3" y="1" width="18" height="23" rx="3" stroke="#d946ef" stroke-width="4" filter="url(#glow)" />
    <path d="M8 7 H16 M8 13 H16" stroke="#f5d0fe" stroke-width="2.4" stroke-linecap="round" />
    <text class="label" x="36" y="20">Contributed to (last year):</text>
    <text class="value" x="430" y="20">3</text>
  </g>

  <g class="fade delay-2">
    <circle cx="558" cy="130" r="58" stroke="#300238" stroke-width="10" />
    <circle class="pulse" cx="558" cy="130" r="58" stroke="url(#purpleRing)" stroke-width="10" stroke-linecap="round" stroke-dasharray="245 365" filter="url(#glow)" transform="rotate(-85 558 130)" />
    <text x="558" y="144" text-anchor="middle" fill="#ffffff" font-family="Consolas, 'Fira Code', monospace" font-size="44" font-weight="800">C+</text>
  </g>

  <g class="fade delay-2" transform="translate(720 50)">
    <text class="title" x="0" y="0">Most Used Languages</text>

    <rect x="0" y="38" width="344" height="13" rx="7" fill="#1f1029" />
    <rect x="0" y="38" width="109" height="13" rx="7" fill="#ec4899" />
    <rect x="109" y="38" width="91" height="13" fill="#3b82f6" />
    <rect x="200" y="38" width="70" height="13" fill="#facc15" />
    <rect x="270" y="38" width="39" height="13" fill="#f59e0b" />
    <rect x="309" y="38" width="35" height="13" rx="7" fill="#22c55e" />

    <circle cx="8" cy="86" r="8" fill="#ec4899" filter="url(#glow)" />
    <text class="muted" x="25" y="92">PHP 31.73%</text>

    <circle cx="220" cy="86" r="8" fill="#facc15" filter="url(#glow)" />
    <text class="muted" x="237" y="92">JavaScript 20.47%</text>

    <circle cx="8" cy="128" r="8" fill="#3b82f6" filter="url(#glow)" />
    <text class="muted" x="25" y="134">CSS 26.54%</text>

    <circle cx="220" cy="128" r="8" fill="#f59e0b" filter="url(#glow)" />
    <text class="muted" x="237" y="134">Java 11.27%</text>

    <circle cx="8" cy="170" r="8" fill="#22c55e" filter="url(#glow)" />
    <text class="muted" x="25" y="176">Python 9.99%</text>
  </g>
</svg>
