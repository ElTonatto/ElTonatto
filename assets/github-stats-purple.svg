<svg width="1100" height="300" viewBox="0 0 1100 300" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">GitHub stats and stack cards in purple dark style</title>
  <desc id="desc">Dark purple profile statistics cards with public GitHub highlights and the full language and technology stack.</desc>

  <defs>
    <linearGradient id="border" x1="0" y1="0" x2="1100" y2="300" gradientUnits="userSpaceOnUse">
      <stop stop-color="#270033" />
      <stop offset="0.5" stop-color="#d000ff" />
      <stop offset="1" stop-color="#3b0764" />
    </linearGradient>

    <linearGradient id="ring" x1="480" y1="42" x2="645" y2="208" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ff00ff" />
      <stop offset="0.48" stop-color="#b000ff" />
      <stop offset="1" stop-color="#2a0030" />
    </linearGradient>

    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="4.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <filter id="dotGlow" x="-90%" y="-90%" width="280%" height="280%">
      <feGaussianBlur stdDeviation="2.6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <style>
      .card {
        fill: #030006;
        stroke: url(#border);
        stroke-width: 2;
      }

      .label {
        fill: #f8f7ff;
        font: 800 21px Consolas, "Fira Code", monospace;
      }

      .value {
        fill: #ffffff;
        font: 800 23px Consolas, "Fira Code", monospace;
      }

      .title {
        fill: #f000ff;
        font: 900 30px Consolas, "Fira Code", monospace;
        filter: url(#glow);
      }

      .stack {
        fill: #e9d5ff;
        font: 700 15px Consolas, "Fira Code", monospace;
      }

      .note {
        fill: #a78bfa;
        font: 600 12px Consolas, "Fira Code", monospace;
      }

      .fade {
        opacity: 0;
        animation: fadeIn 850ms ease-out forwards;
      }

      .delay-1 { animation-delay: 120ms; }
      .delay-2 { animation-delay: 240ms; }
      .delay-3 { animation-delay: 360ms; }
      .delay-4 { animation-delay: 480ms; }
      .pulse { animation: pulse 2.6s ease-in-out infinite; }
      .scan { animation: scan 4.8s linear infinite; }

      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(7px); }
        to { opacity: 1; transform: translateY(0); }
      }

      @keyframes pulse {
        0%, 100% { opacity: 0.78; }
        50% { opacity: 1; }
      }

      @keyframes scan {
        0% { transform: translateX(-260px); opacity: 0; }
        18% { opacity: 0.18; }
        55% { opacity: 0.06; }
        100% { transform: translateX(1120px); opacity: 0; }
      }
    </style>
  </defs>

  <rect width="1100" height="300" rx="8" fill="#08070d" />
  <rect class="card fade" x="8" y="8" width="662" height="284" rx="5" />
  <rect class="card fade delay-1" x="682" y="8" width="410" height="284" rx="5" />
  <rect class="scan" x="0" y="0" width="150" height="300" fill="#ffffff" opacity="0.05" />

  <g class="fade delay-1" transform="translate(46 54)">
    <path d="M12 0 L15.7 7.8 L24 9.1 L18 15 L19.4 23.5 L12 19.4 L4.6 23.5 L6 15 L0 9.1 L8.3 7.8 Z" fill="#f000ff" filter="url(#glow)" />
    <text class="label" x="38" y="20">Public Stars:</text>
    <text class="value" x="360" y="20">0</text>
  </g>

  <g class="fade delay-2" transform="translate(46 96)">
    <circle cx="12" cy="12" r="10" stroke="#f000ff" stroke-width="4" filter="url(#glow)" />
    <path d="M12 5 V12 L17 16" stroke="#f5d0fe" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
    <text class="label" x="38" y="20">2026 Contributions:</text>
    <text class="value" x="360" y="20">37</text>
  </g>

  <g class="fade delay-3" transform="translate(46 138)">
    <circle cx="8" cy="5" r="4" fill="#f000ff" filter="url(#glow)" />
    <circle cx="8" cy="20" r="4" fill="#f000ff" filter="url(#glow)" />
    <circle cx="22" cy="20" r="4" fill="#f000ff" filter="url(#glow)" />
    <path d="M8 9 V16 M12 20 H18" stroke="#f000ff" stroke-width="3" stroke-linecap="round" />
    <text class="label" x="38" y="20">Public Repositories:</text>
    <text class="value" x="360" y="20">2</text>
  </g>

  <g class="fade delay-4" transform="translate(46 180)">
    <rect x="3" y="1" width="18" height="23" rx="3" stroke="#f000ff" stroke-width="4" filter="url(#glow)" />
    <path d="M8 7 H16 M8 13 H16" stroke="#f5d0fe" stroke-width="2.4" stroke-linecap="round" />
    <text class="label" x="38" y="20">Stack Items:</text>
    <text class="value" x="360" y="20">14</text>
  </g>

  <text class="note fade delay-4" x="84" y="242">Public data + declared stack from README and LinkedIn profile</text>

  <g class="fade delay-2">
    <circle cx="558" cy="142" r="62" stroke="#2a0030" stroke-width="11" />
    <circle class="pulse" cx="558" cy="142" r="62" stroke="url(#ring)" stroke-width="11" stroke-linecap="round" stroke-dasharray="270 390" filter="url(#glow)" transform="rotate(-84 558 142)" />
    <text x="558" y="156" text-anchor="middle" fill="#ffffff" font-family="Consolas, 'Fira Code', monospace" font-size="42" font-weight="900">FS</text>
  </g>

  <g class="fade delay-2" transform="translate(716 48)">
    <text class="title" x="0" y="0">Languages &amp; Stack</text>

    <rect x="0" y="44" width="366" height="14" rx="7" fill="#16051f" />
    <rect x="0.00" y="44" width="33.01" height="14" rx="7" fill="#facc15" />
    <rect x="33.01" y="44" width="27.99" height="14" fill="#3776ab" />
    <rect x="61.00" y="44" width="26.55" height="14" fill="#e34f26" />
    <rect x="87.55" y="44" width="25.84" height="14" fill="#1572b6" />
    <rect x="113.39" y="44" width="30.86" height="14" fill="#777bb4" />
    <rect x="144.25" y="44" width="27.27" height="14" fill="#38bdf8" />
    <rect x="171.52" y="44" width="24.40" height="14" fill="#f97316" />
    <rect x="195.92" y="44" width="20.81" height="14" fill="#a855f7" />
    <rect x="216.73" y="44" width="22.96" height="14" fill="#3178c6" />
    <rect x="239.69" y="44" width="29.42" height="14" fill="#21759b" />
    <rect x="269.11" y="44" width="25.12" height="14" fill="#42b883" />
    <rect x="294.23" y="44" width="23.68" height="14" fill="#ffffff" />
    <rect x="317.91" y="44" width="25.84" height="14" fill="#06b6d4" />
    <rect x="343.75" y="44" width="22.25" height="14" rx="7" fill="#3fcf8e" />

    <circle cx="8" cy="81" r="7" fill="#facc15" filter="url(#dotGlow)" />
    <text class="stack" x="24" y="86">JavaScript</text>
    <circle cx="8" cy="109" r="7" fill="#3776ab" filter="url(#dotGlow)" />
    <text class="stack" x="24" y="114">Python</text>
    <circle cx="8" cy="137" r="7" fill="#e34f26" filter="url(#dotGlow)" />
    <text class="stack" x="24" y="142">HTML</text>
    <circle cx="8" cy="165" r="7" fill="#1572b6" filter="url(#dotGlow)" />
    <text class="stack" x="24" y="170">CSS</text>
    <circle cx="8" cy="193" r="7" fill="#777bb4" filter="url(#dotGlow)" />
    <text class="stack" x="24" y="198">PHP</text>
    <circle cx="8" cy="221" r="7" fill="#38bdf8" filter="url(#dotGlow)" />
    <text class="stack" x="24" y="226">SQL</text>
    <circle cx="8" cy="249" r="7" fill="#f97316" filter="url(#dotGlow)" />
    <text class="stack" x="24" y="254">Java</text>
    <circle cx="218" cy="81" r="7" fill="#a855f7" filter="url(#dotGlow)" />
    <text class="stack" x="234" y="86">C</text>
    <circle cx="218" cy="109" r="7" fill="#3178c6" filter="url(#dotGlow)" />
    <text class="stack" x="234" y="114">TypeScript</text>
    <circle cx="218" cy="137" r="7" fill="#21759b" filter="url(#dotGlow)" />
    <text class="stack" x="234" y="142">WordPress</text>
    <circle cx="218" cy="165" r="7" fill="#42b883" filter="url(#dotGlow)" />
    <text class="stack" x="234" y="170">Vue.js</text>
    <circle cx="218" cy="193" r="7" fill="#ffffff" filter="url(#dotGlow)" />
    <text class="stack" x="234" y="198">Next.js</text>
    <circle cx="218" cy="193" r="7" fill="none" stroke="#a855f7" stroke-width="1.5" />
    <circle cx="218" cy="221" r="7" fill="#06b6d4" filter="url(#dotGlow)" />
    <text class="stack" x="234" y="226">Tailwind</text>
    <circle cx="218" cy="249" r="7" fill="#3fcf8e" filter="url(#dotGlow)" />
    <text class="stack" x="234" y="254">Supabase</text>
  </g>
</svg>
