name: Generate contribution snake

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Generate purple snake
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=#c084fc&color_dots=#161b22,#4c1d95,#6d28d9,#9333ea,#c084fc
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=#c084fc&color_dots=#161b22,#4c1d95,#6d28d9,#9333ea,#c084fc
            dist/github-contribution-grid-snake.gif?color_snake=#c084fc&color_dots=#161b22,#4c1d95,#6d28d9,#9333ea,#c084fc&color_background=#0d1117

      - name: Publish snake to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
